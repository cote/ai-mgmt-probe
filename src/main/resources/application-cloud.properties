# =============================================================================
# Cloud profile - active when SPRING_PROFILES_ACTIVE=cloud (set in manifest.yml).
# Only what genuinely differs from local goes here; everything else is inherited
# from application.properties.
# Profile-specific files: https://docs.spring.io/spring-boot/reference/features/external-config.html#features.external-config.files.profile-specific
# =============================================================================

# --- Shutdown ----------------------------------------------------------------
# Drain in-flight requests on stop/restage instead of dropping them. Boot's
# default is "immediate"; we only want graceful on the platform.
# https://docs.spring.io/spring-boot/reference/web/graceful-shutdown.html
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# --- Actuator exposure -------------------------------------------------------
# NOTE: this REPLACES (does not merge with) the base list in application.properties.
# "prometheus" is the on-ramp for app-internal metrics (jvm.*, http.server.requests,
# probe_dumper_invocations_total). It's the common denominator the platform scrapes -
# whether via the classic Metric Registrar (Loggregator) or the newer OpenTelemetry
# Collector agent. After deploy, register it once:
#   cf register-metrics-endpoint <app> /actuator/prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# SECURITY: base application.properties sets show-values=always for local dev (throwaway
# Ollama key). In the cloud the REAL GenAI api-key is bound via VCAP, and Boot no longer
# auto-masks sensitive key names - so always would leak it through configprops/env
# (including over MCP). Force masking in the cloud. Property names stay visible; values
# are masked.
management.endpoint.configprops.show-values=never
management.endpoint.env.show-values=never

# --- Cloud Foundry actuator integration --------------------------------------
# Requires spring-boot-starter-cloudfoundry (Boot 4 split it out of the actuator
# starter). With that dependency, it auto-activates on the platform (VCAP_APPLICATION
# present), exposing /cloudfoundryapplication/** to the Apps Manager actuator UI with
# its own Space-Developer-role security - independent of the web exposure list above.
# These properties are inert without the starter.
# https://techdocs.broadcom.com/us/en/vmware-tanzu/platform/tanzu-platform-for-cloud-foundry/6-0/tpcf/using-actuators.html
management.cloudfoundry.enabled=true
# Uncomment if the foundation uses self-signed certs and the CF UI can't reach it:
#management.cloudfoundry.skip-ssl-validation=true
