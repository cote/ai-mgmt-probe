# =============================================================================
# Cloud profile - active when SPRING_PROFILES_ACTIVE=cloud (set in manifest.yml).
# Only what genuinely differs from local goes here; everything else is inherited
# from application.properties.
# Profile-specific files: https://docs.spring.io/spring-boot/reference/features/external-config.html#features.external-config.files.profile-specific
# =============================================================================

# --- Shutdown ----------------------------------------------------------------
# Drain in-flight requests on stop/restage instead of dropping them. Boot's
# default is "immediate"; we only want graceful on the platform.
# https://docs.spring.io/spring-boot/reference/web/graceful-shutdown.html
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# --- Actuator exposure -------------------------------------------------------
# NOTE: this REPLACES (does not merge with) the base list in application.properties.
# "prometheus" is the on-ramp for app-internal metrics (jvm.*, http.server.requests,
# probe_dumper_invocations_total). It's the common denominator the platform scrapes -
# whether via the classic Metric Registrar (Loggregator) or the newer OpenTelemetry
# Collector agent. After deploy, register it once:
#   cf register-metrics-endpoint <app> /actuator/prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# --- Cloud Foundry actuator integration --------------------------------------
# Requires spring-boot-starter-cloudfoundry (Boot 4 split it out of the actuator
# starter). With that dependency, it auto-activates on the platform (VCAP_APPLICATION
# present), exposing /cloudfoundryapplication/** to the Apps Manager actuator UI with
# its own Space-Developer-role security - independent of the web exposure list above.
# These properties are inert without the starter.
# https://techdocs.broadcom.com/us/en/vmware-tanzu/platform/tanzu-platform-for-cloud-foundry/6-0/tpcf/using-actuators.html
management.cloudfoundry.enabled=true
# Uncomment if the foundation uses self-signed certs and the CF UI can't reach it:
#management.cloudfoundry.skip-ssl-validation=true

# --- OAuth2 Resource Server (JWT validation) ---------------------------------
# Spring Security's OAuth2 Resource Server fetches the JWKS from this URL and
# uses it to verify the signature of every inbound JWT. Used by SecurityConfig's
# cloud chain to require auth on /mcp/**. Once verified, the JWT's payload claims
# (sub, user_name, email, scope, ...) are available to tool methods via
# @AuthenticationPrincipal Jwt jwt. The raw token never leaves the filter chain.
#
# SET THIS. Leave blank and the cloud filter chain will fail to start.
#
# Tanzu Platform / Cloud Foundry UAA - substitute your foundation's system domain:
#   https://login.sys.<FOUNDATION-DOMAIN>/token_keys
# For any other OIDC provider, see the "Configuration properties" section in
# SecurityConfig.java for example values (Keycloak, Auth0, Cognito, Azure AD).
#
# Alternative: use OIDC discovery instead of a direct JWKS - set
# spring.security.oauth2.resourceserver.jwt.issuer-uri to the IdP's base URL and
# Spring will fetch /.well-known/openid-configuration to find the JWKS.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=

# --- Model config for the `trace` tool ---------------------------------------
# The base application.properties points at http://localhost:11434 (Ollama) for
# local dev. In the CF container that URL is unreachable, so if this stays as
# the base fallback the `trace` tool fails with "Connection refused" after the
# HTTP client retries.
#
# Intent: bind a Tanzu GenAI service to the probe. VCAP_SERVICES then populates
# the model config automatically - spring-boot-starter-cloudfoundry's cfenv
# maps the service credentials to environment properties, and Spring AI's
# OpenAI starter reads SPRING_AI_OPENAI_BASE_URL / _API_KEY /
# _CHAT_OPTIONS_MODEL from the environment.
#
#   cf create-service genai <plan> mcp-probe-genai
#   cf bind-service mcp-probe mcp-probe-genai
#   cf restart mcp-probe
#
# Blank overrides here so the localhost:11434 fallback from the base file
# doesn't silently leak into cloud. Without a GenAI binding, `trace` fails
# with a clear "no endpoint configured" error; every other tool still works.
spring.ai.openai.base-url=
spring.ai.openai.api-key=
spring.ai.openai.chat.options.model=
