# This is a maximal properties file with most things commented out.
# They're here ot see what's available and tinker.

spring.application.name=probe

# Shutdown stays at Boot's default (immediate) locally for fast dev cycles.
# The cloud profile switches it to graceful - see application-cloud.properties.

# =============================================================================
# Spring AI MCP Server config
# Reference: https://docs.spring.io/spring-ai/reference/api/mcp/mcp-server-boot-starter-docs.html
# Streamable transport:  https://docs.spring.io/spring-ai/reference/api/mcp/mcp-streamable-http-server-boot-starter-docs.html
# Property list/defaults from spring-configuration-metadata.json in the starter jar.
# =============================================================================

# Transport protocol. Default is "sse" (legacy Server-Sent Events). Use "streamable"
# for Streamable HTTP - the current spec transport, and what the Tanzu MCP Gateway
# requires (proxied at exactly /mcp). This is the one line that must be set.
spring.ai.mcp.server.protocol=streamable

# --- Streamable HTTP transport ------------------------------------------------
# Endpoint path the server listens on. Gateway requires exactly /mcp - do not change.
#spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp
# Reject HTTP DELETE (client session teardown) if true.
#spring.ai.mcp.server.streamable-http.disallow-delete=false
# Keep-alive ping interval. Disabled by default.
#spring.ai.mcp.server.streamable-http.keep-alive-interval=

# --- Legacy SSE transport (only used when protocol=sse) -----------------------
#spring.ai.mcp.server.sse-endpoint=/sse
#spring.ai.mcp.server.sse-message-endpoint=/mcp/message

# --- Server identity (reported to clients, shown in logs/monitoring) ----------
#spring.ai.mcp.server.name=mcp-server
#spring.ai.mcp.server.version=1.0.0
# Instructions surfaced to the client on how to use this server.
#spring.ai.mcp.server.instructions=

# --- Lifecycle / toggles ------------------------------------------------------
# Master switch; false => MCP server and all components skip initialization.
#spring.ai.mcp.server.enabled=true
# SYNC (default) or ASYNC server execution model.
#spring.ai.mcp.server.type=sync
# Scan beans for @McpTool/@McpResource/@McpPrompt annotations. Leave on.
#spring.ai.mcp.server.annotation-scanner.enabled=true
# Also expose stdio transport (for local CLI-style clients). Off by default.
#spring.ai.mcp.server.stdio=false
# Re-expose tools from downstream MCP clients as this server's tools.
#spring.ai.mcp.server.expose-mcp-client-tools=false

# --- Capabilities (advertised to clients) -------------------------------------
#spring.ai.mcp.server.capabilities.tool=true
#spring.ai.mcp.server.capabilities.resource=true
#spring.ai.mcp.server.capabilities.prompt=true
#spring.ai.mcp.server.capabilities.completion=true

# --- Change notifications (server pushes list-changed to clients) -------------
# NOTE: server->client round-trips do NOT survive the gateway (re-initializes per
# request), so these are effectively local-only once behind the gateway.
#spring.ai.mcp.server.tool-change-notification=true
#spring.ai.mcp.server.resource-change-notification=true
#spring.ai.mcp.server.prompt-change-notification=true

# --- Timeouts / keep-alive ----------------------------------------------------
# How long the server waits on a request before timing out.
#spring.ai.mcp.server.request-timeout=20s
# Connection keep-alive interval (top-level). Disabled by default.
#spring.ai.mcp.server.keep-alive-interval=
# Optional per-tool response MIME type override (map: tool-name -> mime).
#spring.ai.mcp.server.tool-response-mime-type=

## Actuator settings
# Secure by default: expose only health, info, metrics. The web and MCP exposure lists are
# independent (MCP exposure is this project's own technology - see McpEndpointDiscoverer).
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# MCP actuator exposure (standard endpoints: https://docs.spring.io/spring-boot/reference/actuator/endpoints.html)
management.endpoints.mcp.exposure.include=health,info,metrics

# --- Local-only config introspection (DO NOT enable on a reachable instance) ----------------
# configprops/env enumerate every @ConfigurationProperties bean and the whole environment.
# Values are masked (show-values=never) UNLESS you set show-values=always - which reveals
# EVERYTHING in plaintext, including api keys and (on Cloud Foundry) VCAP_SERVICES credentials.
# Boot does NOT auto-mask secret-looking keys, and /dumper would aggregate this too. Local dev
# only, behind no public route.
#management.endpoints.web.exposure.include=health,info,metrics,configprops,env
#management.endpoints.mcp.exposure.include=health,info,metrics,configprops,env
#management.endpoint.configprops.show-values=always
#management.endpoint.env.show-values=always

## Local model: Ollama via its OpenAI-compatible endpoint (Spring AI appends /v1/chat/completions).
## api-key is a throwaway - Ollama ignores it. Cloud overrides base-url/api-key via VCAP.
# Spring AI 2.0's openai starter uses the official com.openai SDK, which appends
# /chat/completions and expects /v1 IN the base-url (unlike the old RestClient path props).
spring.ai.openai.base-url=http://localhost:11434/v1
spring.ai.openai.api-key=ollama
spring.ai.openai.chat.options.model=gemma3:4b

## Logging
# Uncomment to see what the SimpleLoggerAdvisor (wired into the Tracer's ChatClient) logs for
# each model call: the rendered request sent and the response received. DEBUG, advisor only.
#logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=DEBUG
# Broader, noisier Spring AI debug (transport, options, tool calls):
#logging.level.org.springframework.ai=DEBUG